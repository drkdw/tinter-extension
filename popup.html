<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tinter</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <div id="header-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
                <circle cx="16" cy="16" r="16" fill="#242938" />
                <path d="M 16,2 A 14,14 0 0,1 28.1,23 L 16,16 Z" fill="#5B7FFF" />
                <path d="M 28.1,23 A 14,14 0 0,1 3.9,23 L 16,16 Z" fill="#FFD75B" />
                <path d="M 3.9,23 A 14,14 0 0,1 16,2 L 16,16 Z" fill="#FF5B7D" />
                <circle cx="16" cy="16" r="4" fill="white" />
                <circle cx="16" cy="16" r="14" fill="none" stroke="white" stroke-width="0.5" />
            </svg>
            <div>
                <h1>Tinter <span id="app-version"></span></h1>
                <p>Color palette &amp; shade generator</p>
            </div>
        </div>
        <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <!-- icon injected by JS -->
        </button>
    </header>

    <div id="main-container">
        <div id="input-container">
            <input type="text" id="color-input" placeholder="#5B7FFF" maxlength="7">
            <button id="generate-button">Generate</button>
        </div>

        <div id="output-container" style="display: none;">
            <div id="css-output-container">
                <div class="header">
                    <h2>Generated CSS</h2>
                    <button id="copy-css-button" class="copy-button">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy CSS
                    </button>
                </div>
                <pre><code id="css-output"></code></pre>
            </div>

            <div id="color-preview"></div>

            <div id="combo-container"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <footer>
        <a href="https://buymeacoffee.com/hoolite" target="_blank" id="bmc-link">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee">
        </a>
        <a href="https://github.com/drkdw/tinter-extension" target="_blank" id="github-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-label="GitHub">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
            </svg>
            GitHub
        </a>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
